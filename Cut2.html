<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Toán Học - Thử Thách Căn Thức & Đường Tròn</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4c51bf 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: white;
            font-size: 3em;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            color: #bfdbfe;
            font-size: 1.3em;
        }
        
        .icon-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin-bottom: 15px;
        }
        
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-mode {
            padding: 12px 20px;
            font-size: 1.1em;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 12px;
            margin: 5px;
        }

        .btn-mode.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-color: #f59e0b;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .leaderboard-item.gold {
            background: rgba(234, 179, 8, 0.3);
            border: 2px solid #fbbf24;
        }
        
        .leaderboard-item.silver {
            background: rgba(156, 163, 175, 0.3);
            border: 2px solid #9ca3af;
        }
        
        .leaderboard-item.bronze {
            background: rgba(234, 88, 12, 0.3);
            border: 2px solid #ea580c;
        }
        
        .rank {
            font-size: 2em;
            font-weight: bold;
            color: white;
            width: 50px;
            text-align: center;
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        
        .player-stats {
            color: #bfdbfe;
            font-size: 0.9em;
        }
        
        .score {
            font-size: 2em;
            font-weight: bold;
            color: #fbbf24;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .player-display {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
        }
        
        .score-display {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .streak-badge {
            background: rgba(249, 115, 22, 0.3);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid #f97316;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .streak-badge span {
            color: white;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .current-score {
            font-size: 2em;
            font-weight: bold;
            color: #fbbf24;
        }

        .level-badge {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid #a78bfa;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            transition: width 0.5s ease;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .category-badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.3);
            color: #c084fc;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid #a855f7;
            margin-bottom: 15px;
        }

        .type-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid #3b82f6;
            margin-bottom: 15px;
            margin-left: 10px;
        }
        
        .question-text {
            color: white;
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            padding: 15px 20px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateX(5px);
        }
        
        .option-btn.correct {
            background: rgba(34, 197, 94, 0.5);
            border-color: #22c55e;
        }
        
        .option-btn.incorrect {
            background: rgba(239, 68, 68, 0.5);
            border-color: #ef4444;
        }
        
        .option-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .virtual-keyboard {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .keyboard-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .keyboard-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 45px;
            text-align: center;
        }

        .key-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .key-btn.wide {
            min-width: 80px;
        }

        .essay-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin-bottom: 15px;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .essay-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .essay-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.25);
        }
        
        .result-box {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .result-box.correct {
            background: rgba(34, 197, 94, 0.3);
            border: 2px solid #22c55e;
        }
        
        .result-box.incorrect {
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid #ef4444;
        }

        .result-box.partial {
            background: rgba(245, 158, 11, 0.3);
            border: 2px solid #f59e0b;
        }
        
        .result-title {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-explanation {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }
        
        .bonus-points {
            color: #fbbf24;
            font-weight: bold;
            margin-top: 8px;
        }

        .your-answer {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.9);
        }

        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.5s ease, slideOut 0.5s ease 2.5s;
            min-width: 300px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .achievement-title {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .achievement-desc {
            color: rgba(255, 255, 255, 0.9);
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .achievement-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .achievement-card.unlocked {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
        }

        .achievement-card.locked {
            opacity: 0.5;
        }

        .achievement-icon {
            font-size: 3em;
            text-align: center;
            margin-bottom: 10px;
        }

        .achievement-name {
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 5px;
        }

        .achievement-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 5px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1em;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .export-buttons button {
            flex: 1;
        }

        .sound-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s;
        }

        .sound-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .hidden {
            display: none;
        }
        
        h2 {
            color: white;
            font-size: 2em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: white;
            border-bottom-color: #fbbf24;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .achievement-popup {
                right: 10px;
                left: 10px;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <div id="homeScreen">
            <div class="header">
                <div class="icon-row">
                    <span style="font-size: 4em;">🧠</span>
                    <h1>Thử Thách Toán Học</h1>
                    <span style="font-size: 4em;">🏆</span>
                </div>
                <p>Căn Thức & Đường Tròn</p>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>🎯 Bắt Đầu Chơi</h2>
                    <button class="sound-toggle" onclick="toggleSound()" id="soundToggle">🔊</button>
                </div>
                <div class="input-group">
                    <input type="text" id="playerNameInput" placeholder="Nhập tên của bạn..." />
                    <div class="mode-selector">
                        <button class="btn-mode active" data-mode="mixed" onclick="selectMode('mixed')">
                            🎲 Hỗn Hợp
                        </button>
                        <button class="btn-mode" data-mode="multiple" onclick="selectMode('multiple')">
                            ✅ Trắc Nghiệm
                        </button>
                        <button class="btn-mode" data-mode="essay" onclick="selectMode('essay')">
                            ✍️ Tự Luận
                        </button>
                    </div>
                    <button class="btn btn-primary" onclick="startGame()">🚀 Bắt Đầu Thử Thách</button>
                </div>
            </div>

            <div class="card">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('leaderboard')">🏆 Bảng Xếp Hạng</button>
                    <button class="tab" onclick="switchTab('achievements')">🏅 Thành Tựu</button>
                    <button class="tab" onclick="switchTab('statistics')">📊 Thống Kê</button>
                    <button class="tab" onclick="switchTab('data')">💾 Dữ Liệu</button>
                </div>

                <div id="leaderboardTab" class="tab-content active">
                    <div id="leaderboardList"></div>
                </div>

                <div id="achievementsTab" class="tab-content">
                    <div class="achievements-grid" id="achievementsList"></div>
                </div>

                <div id="statisticsTab" class="tab-content">
                    <div id="playerStatsInfo" style="color: rgba(255,255,255,0.6); text-align: center;">Chọn người chơi để xem thống kê</div>
                    <select id="playerSelect" style="width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 20px; font-size: 1.1em;" onchange="showPlayerStats()">
                        <option value="">-- Chọn người chơi --</option>
                    </select>
                    <div id="statsContent"></div>
                </div>

                <div id="dataTab" class="tab-content">
                    <h3 style="color: white; margin-bottom: 15px;">Sao lưu & Khôi phục dữ liệu</h3>
                    <p style="color: rgba(255,255,255,0.8); margin-bottom: 20px;">
                        Xuất dữ liệu để sao lưu hoặc chuyển sang thiết bị khác
                    </p>
                    <div class="export-buttons">
                        <button class="btn btn-primary" onclick="exportData()">📥 Xuất Dữ Liệu</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📤 Nhập Dữ Liệu</button>
                    </div>
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
                    <button class="btn btn-secondary" style="margin-top: 10px;" onclick="clearAllData()">🗑️ Xóa Toàn Bộ Dữ Liệu</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div class="card">
                <div class="game-header">
                    <div>
                        <div class="player-display">👤 <span id="currentPlayerName"></span></div>
                        <div class="level-badge" id="levelBadge">Level 1</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <div class="level-info">
                            <span id="currentExp">0 EXP</span>
                            <span id="nextLevelExp">/ 100 EXP</span>
                        </div>
                    </div>
                    <div class="score-display">
                        <div id="streakBadge" class="streak-badge hidden">
                            <span>⚡</span>
                            <span id="streakCount">0</span>
                        </div>
                        <div class="current-score" id="currentScore">0 điểm</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div>
                    <span class="category-badge" id="questionCategory"></span>
                    <span class="type-badge" id="questionType"></span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div id="multipleChoiceContainer" class="hidden">
                    <div class="options" id="optionsContainer"></div>
                </div>
                <div id="essayContainer" class="hidden">
                    <textarea class="essay-input" id="essayInput" placeholder="Nhập câu trả lời của bạn...&#10;&#10;Ví dụ:&#10;- x ≥ 2&#10;- 3√2&#10;- 60°"></textarea>
                    
                    <!-- Bàn phím ảo -->
                    <div class="virtual-keyboard">
                        <div class="keyboard-label">⌨️ Phím ảo - Click để chèn ký tự</div>
                        
                        <div class="keyboard-row">
                            <button class="key-btn" onclick="insertSymbol('≥')">≥</button>
                            <button class="key-btn" onclick="insertSymbol('≤')">≤</button>
                            <button class="key-btn" onclick="insertSymbol('=')">＝</button>
                            <button class="key-btn" onclick="insertSymbol('≠')">≠</button>
                            <button class="key-btn" onclick="insertSymbol('<')">＜</button>
                            <button class="key-btn" onclick="insertSymbol('>')">＞</button>
                        </div>
                        
                        <div class="keyboard-row">
                            <button class="key-btn" onclick="insertSymbol('√')">√</button>
                            <button class="key-btn" onclick="insertSymbol('²')">²</button>
                            <button class="key-btn" onclick="insertSymbol('³')">³</button>
                            <button class="key-btn" onclick="insertSymbol('°')">°</button>
                            <button class="key-btn" onclick="insertSymbol('π')">π</button>
                        </div>
                        
                        <div class="keyboard-row">
                            <button class="key-btn" onclick="insertSymbol('½')">½</button>
                            <button class="key-btn" onclick="insertSymbol('⅓')">⅓</button>
                            <button class="key-btn" onclick="insertSymbol('¼')">¼</button>
                            <button class="key-btn" onclick="insertSymbol('¾')">¾</button>
                            <button class="key-btn" onclick="insertSymbol('⅔')">⅔</button>
                        </div>
                        
                        <div class="keyboard-row">
                            <button class="key-btn" onclick="insertSymbol('0')">0</button>
                            <button class="key-btn" onclick="insertSymbol('1')">1</button>
                            <button class="key-btn" onclick="insertSymbol('2')">2</button>
                            <button class="key-btn" onclick="insertSymbol('3')">3</button>
                            <button class="key-btn" onclick="insertSymbol('4')">4</button>
                            <button class="key-btn" onclick="insertSymbol('5')">5</button>
                            <button class="key-btn" onclick="insertSymbol('6')">6</button>
                            <button class="key-btn" onclick="insertSymbol('7')">7</button>
                            <button class="key-btn" onclick="insertSymbol('8')">8</button>
                            <button class="key-btn" onclick="insertSymbol('9')">9</button>

        // Audio context for sounds
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            if (!soundEnabled) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function calculateLevel(exp) {
            return Math.floor(exp / 100) + 1;
        }

        function getExpForNextLevel(level) {
            return level * 100;
        }

        function addExp(amount) {
            if (!currentPlayer) return;
            
            const oldLevel = currentPlayer.level || 1;
            currentPlayer.exp = (currentPlayer.exp || 0) + amount;
            currentPlayer.level = calculateLevel(currentPlayer.exp);
            
            if (currentPlayer.level > oldLevel) {
                playLevelUpSound();
                showAchievement('🎉 Level Up!', `Bạn đã lên cấp ${currentPlayer.level}!`);
                checkAchievements();
            }
            
            updateLevelDisplay();
            savePlayers();
        }

        function updateLevelDisplay() {
            if (!currentPlayer) return;
            
            const level = currentPlayer.level || 1;
            const exp = currentPlayer.exp || 0;
            const currentLevelExp = (level - 1) * 100;
            const nextLevelExp = level * 100;
            const progress = ((exp - currentLevelExp) / (nextLevelExp - currentLevelExp)) * 100;
            
            document.getElementById('levelBadge').textContent = `⭐ Level ${level}`;
            document.getElementById('currentExp').textContent = `${exp} EXP`;
            document.getElementById('nextLevelExp').textContent = `/ ${nextLevelExp} EXP`;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (!data.players || !Array.isArray(data.players)) {
                        throw new Error('Invalid data format');
                    }
                    
                    if (confirm('⚠️ Nhập dữ liệu sẽ GHI ĐÈ lên dữ liệu hiện tại. Bạn có chắc chắn?')) {
                        players = data.players;
                        savePlayers();

                    }
                } catch (error) {
                    alert('❌ Lỗi: File không hợp lệ!');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function insertSymbol(symbol) {
            const textarea = document.getElementById('essayInput');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            
            const newText = text.substring(0, start) + symbol + text.substring(end);
            textarea.value = newText;
            
            const newCursorPos = start + symbol.length;
            textarea.setSelectionRange(newCursorPos, newCursorPos);
            textarea.focus();
        }

        function normalizeAnswer(answer) {
            return answer.toLowerCase()
                .replace(/\s+/g, '')
                .replace(/degrees?/gi, '')
                .replace(/độ/g, '')
                .replace(/\*/g, '')
                .replace(/sqrt/g, '√')
                .replace(/\(/g, '')
                .replace(/\)/g, '');
        }

        function checkEssayAnswer(userAnswer) {
            const normalized = normalizeAnswer(userAnswer);
            
            for (let correctAns of currentQuestion.correctAnswers) {
                if (normalizeAnswer(correctAns) === normalized) {
                    return { correct: true, partial: false };
                }
            }
            
            for (let correctAns of currentQuestion.correctAnswers) {
                const normCorrect = normalizeAnswer(correctAns);
                if (normalized.includes(normCorrect) || normCorrect.includes(normalized)) {
                    return { correct: false, partial: true };
                }
            }
            
            return { correct: false, partial: false };
        }

        function submitEssay() {
            if (showResult) return;
            
            const userAnswer = document.getElementById('essayInput').value.trim();
            if (!userAnswer) {
                alert('Vui lòng nhập câu trả lời!');
                return;
            }

            showResult = true;
            const result = checkEssayAnswer(userAnswer);
            
            if (result.correct) {
                streak++;
                const points = 15 + Math.min(streak * 5, 50);
                currentPlayer.score += points;
                currentPlayer.correct++;
                addExp(15);
                playCorrectSound();
            } else if (result.partial) {
                streak = Math.max(0, streak - 1);
                currentPlayer.score += 5;
                addExp(5);
            } else {
                streak = 0;
                playIncorrectSound();
            }

            currentPlayer.total++;
            currentPlayer.bestStreak = Math.max(currentPlayer.bestStreak, streak);
            checkAchievements();
            savePlayers();
            updateScore();

            const resultBox = document.getElementById('resultBox');
            let resultClass = result.correct ? 'correct' : result.partial ? 'partial' : 'incorrect';
            let resultTitle = result.correct ? '✅ Chính xác!' : result.partial ? '⚠️ Gần đúng!' : '❌ Sai rồi!';
            
            resultBox.className = 'result-box ' + resultClass;
            resultBox.innerHTML = `
                <div class="result-title">${resultTitle}</div>
                <div class="your-answer"><strong>Câu trả lời của bạn:</strong> ${userAnswer}</div>
                <div class="result-explanation">${currentQuestion.explanation}</div>
                ${result.correct && streak > 0 ? `<div class="bonus-points">🔥 Chuỗi ${streak} câu đúng! +${15 + Math.min(streak * 5, 50)} điểm | +15 EXP</div>` : ''}
                ${result.partial ? `<div class="bonus-points">+5 điểm cho câu trả lời gần đúng | +5 EXP</div>` : ''}
            `;
            resultBox.classList.remove('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function selectAnswer(index) {
            if (showResult) return;

            selectedAnswer = index;
            showResult = true;
            const isCorrect = index === currentQuestion.correct;

            if (isCorrect) {
                streak++;
                playCorrectSound();
            } else {
                streak = 0;
                playIncorrectSound();
            }

            if (isCorrect) {
                const points = 10 + Math.min(streak * 5, 50);
                currentPlayer.score += points;
                currentPlayer.correct++;
                addExp(10);
            }
            currentPlayer.total++;
            currentPlayer.bestStreak = Math.max(currentPlayer.bestStreak, streak);
            checkAchievements();
            savePlayers();
            updateScore();

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.add('disabled');
                if (i === currentQuestion.correct) {
                    btn.classList.add('correct');
                } else if (i === selectedAnswer) {
                    btn.classList.add('incorrect');
                }
            });

            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-box ' + (isCorrect ? 'correct' : 'incorrect');
            resultBox.innerHTML = `
                <div class="result-title">${isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!'}</div>
                <div class="result-explanation">${currentQuestion.explanation}</div>
                ${isCorrect && streak > 0 ? `<div class="bonus-points">🔥 Chuỗi ${streak} câu đúng! +${10 + Math.min(streak * 5, 50)} điểm | +10 EXP</div>` : ''}
            `;
            resultBox.classList.remove('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = currentPlayer.score + ' điểm';
            const streakBadge = document.getElementById('streakBadge');
            if (streak > 0) {
                streakBadge.classList.remove('hidden');
                document.getElementById('streakCount').textContent = 'x' + streak;
            } else {
                streakBadge.classList.add('hidden');
            }
        }

        function goHome() {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            updateLeaderboard();
            displayAchievements();
        }

        loadPlayers();

        document.getElementById('playerNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });

        document.getElementById('essayInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitEssay();
            }
        });
    </script>
</body>

</html>
