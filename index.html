<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Toán Học - Thử Thách Căn Thức & Đường Tròn</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4c51bf 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: white;
            font-size: 3em;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            color: #bfdbfe;
            font-size: 1.3em;
        }
        
        .icon-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin-bottom: 15px;
        }
        
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-mode {
            padding: 12px 20px;
            font-size: 1.1em;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 12px;
            margin: 5px;
        }

        .btn-mode.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-color: #f59e0b;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .leaderboard-item.gold {
            background: rgba(234, 179, 8, 0.3);
            border: 2px solid #fbbf24;
        }
        
        .leaderboard-item.silver {
            background: rgba(156, 163, 175, 0.3);
            border: 2px solid #9ca3af;
        }
        
        .leaderboard-item.bronze {
            background: rgba(234, 88, 12, 0.3);
            border: 2px solid #ea580c;
        }
        
        .rank {
            font-size: 2em;
            font-weight: bold;
            color: white;
            width: 50px;
            text-align: center;
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        
        .player-stats {
            color: #bfdbfe;
            font-size: 0.9em;
        }
        
        .score {
            font-size: 2em;
            font-weight: bold;
            color: #fbbf24;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .player-display {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
        }
        
        .score-display {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .streak-badge {
            background: rgba(249, 115, 22, 0.3);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid #f97316;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .streak-badge span {
            color: white;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .current-score {
            font-size: 2em;
            font-weight: bold;
            color: #fbbf24;
        }
        
        .category-badge {
            display: inline-block;
            background: rgba(168, 85, 247, 0.3);
            color: #c084fc;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid #a855f7;
            margin-bottom: 15px;
        }

        .type-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid #3b82f6;
            margin-bottom: 15px;
            margin-left: 10px;
        }
        
        .question-text {
            color: white;
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            padding: 15px 20px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateX(5px);
        }
        
        .option-btn.correct {
            background: rgba(34, 197, 94, 0.5);
            border-color: #22c55e;
        }
        
        .option-btn.incorrect {
            background: rgba(239, 68, 68, 0.5);
            border-color: #ef4444;
        }
        
        .option-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .essay-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin-bottom: 15px;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .essay-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .essay-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.25);
        }
        
        .result-box {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .result-box.correct {
            background: rgba(34, 197, 94, 0.3);
            border: 2px solid #22c55e;
        }
        
        .result-box.incorrect {
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid #ef4444;
        }

        .result-box.partial {
            background: rgba(245, 158, 11, 0.3);
            border: 2px solid #f59e0b;
        }
        
        .result-title {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-explanation {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }
        
        .bonus-points {
            color: #fbbf24;
            font-weight: bold;
            margin-top: 8px;
        }

        .your-answer {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .hidden {
            display: none;
        }
        
        h2 {
            color: white;
            font-size: 2em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        .virtual-keyboard {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.keyboard-label {
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.9em;
    margin-bottom: 10px;
    font-weight: bold;
}

.keyboard-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
}

.key-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 45px;
    text-align: center;
}

.key-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
}

.key-btn:active {
    transform: scale(0.95);
}

.key-btn.wide {
    min-width: 80px;
}
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <div id="homeScreen">
            <div class="header">
                <div class="icon-row">
                    <span style="font-size: 4em;">🧠</span>
                    <h1>Thử Thách Toán Học</h1>
                    <span style="font-size: 4em;">🏆</span>
                </div>
                <p>Căn Thức & Đường Tròn</p>
            </div>

            <div class="card">
                <h2>🎯 Bắt Đầu Chơi</h2>
                <div class="input-group">
                    <input type="text" id="playerNameInput" placeholder="Nhập tên của bạn..." />
                    <div class="mode-selector">
                        <button class="btn-mode active" data-mode="mixed" onclick="selectMode('mixed')">
                            🎲 Hỗn Hợp
                        </button>
                        <button class="btn-mode" data-mode="multiple" onclick="selectMode('multiple')">
                            ✅ Trắc Nghiệm
                        </button>
                        <button class="btn-mode" data-mode="essay" onclick="selectMode('essay')">
                            ✍️ Tự Luận
                        </button>
                    </div>
                    <button class="btn btn-primary" onclick="startGame()">🚀 Bắt Đầu Thử Thách</button>
                </div>
            </div>

            <div class="card" id="leaderboardCard">
                <h2>🏆 Bảng Xếp Hạng</h2>
                <div id="leaderboardList"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div class="card">
                <div class="game-header">
                    <div class="player-display">👤 <span id="currentPlayerName"></span></div>
                    <div class="score-display">
                        <div id="streakBadge" class="streak-badge hidden">
                            <span>⚡</span>
                            <span id="streakCount">0</span>
                        </div>
                        <div class="current-score" id="currentScore">0 điểm</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div>
                    <span class="category-badge" id="questionCategory"></span>
                    <span class="type-badge" id="questionType"></span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div id="multipleChoiceContainer" class="hidden">
                    <div class="options" id="optionsContainer"></div>
                </div>
                <div id="essayContainer" class="hidden">
    <textarea class="essay-input" id="essayInput" placeholder="Nhập câu trả lời của bạn...&#10;&#10;Ví dụ:&#10;- x ≥ 2&#10;- 3√2&#10;- 60°"></textarea>
    
    <!-- Bàn phím ảo -->
    <div class="virtual-keyboard">
        <div class="keyboard-label">⌨️ Phím ảo - Click để chèn ký tự</div>
        
        <div class="keyboard-row">
            <button class="key-btn" onclick="insertSymbol('≥')">≥</button>
            <button class="key-btn" onclick="insertSymbol('≤')">≤</button>
            <button class="key-btn" onclick="insertSymbol('=')">＝</button>
            <button class="key-btn" onclick="insertSymbol('≠')">≠</button>
            <button class="key-btn" onclick="insertSymbol('<')">＜</button>
            <button class="key-btn" onclick="insertSymbol('>')">＞</button>
        </div>
        
        <div class="keyboard-row">
            <button class="key-btn" onclick="insertSymbol('√')">√</button>
            <button class="key-btn" onclick="insertSymbol('²')">²</button>
            <button class="key-btn" onclick="insertSymbol('³')">³</button>
            <button class="key-btn" onclick="insertSymbol('°')">°</button>
            <button class="key-btn" onclick="insertSymbol('π')">π</button>
        </div>
        
        <div class="keyboard-row">
            <button class="key-btn" onclick="insertSymbol('½')">½</button>
            <button class="key-btn" onclick="insertSymbol('⅓')">⅓</button>
            <button class="key-btn" onclick="insertSymbol('¼')">¼</button>
            <button class="key-btn" onclick="insertSymbol('¾')">¾</button>
            <button class="key-btn" onclick="insertSymbol('⅔')">⅔</button>
        </div>
        
        <div class="keyboard-row">
            <button class="key-btn" onclick="insertSymbol('0')">0</button>
            <button class="key-btn" onclick="insertSymbol('1')">1</button>
            <button class="key-btn" onclick="insertSymbol('2')">2</button>
            <button class="key-btn" onclick="insertSymbol('3')">3</button>
            <button class="key-btn" onclick="insertSymbol('4')">4</button>
            <button class="key-btn" onclick="insertSymbol('5')">5</button>
            <button class="key-btn" onclick="insertSymbol('6')">6</button>
            <button class="key-btn" onclick="insertSymbol('7')">7</button>
            <button class="key-btn" onclick="insertSymbol('8')">8</button>
            <button class="key-btn" onclick="insertSymbol('9')">9</button>
        </div>
        
        <div class="keyboard-row">
            <button class="key-btn" onclick="insertSymbol('x')">x</button>
            <button class="key-btn" onclick="insertSymbol('y')">y</button>
            <button class="key-btn" onclick="insertSymbol('+')" style="font-size: 1.4em;">+</button>
            <button class="key-btn" onclick="insertSymbol('-')" style="font-size: 1.4em;">−</button>
            <button class="key-btn" onclick="insertSymbol('×')">×</button>
            <button class="key-btn" onclick="insertSymbol('÷')">÷</button>
            <button class="key-btn" onclick="insertSymbol('(')">(</button>
            <button class="key-btn" onclick="insertSymbol(')')">)</button>
            <button class="key-btn wide" onclick="insertSymbol('/')">/</button>
        </div>
    </div>
    
    <button class="btn btn-primary" onclick="submitEssay()">✓ Nộp Bài</button>
</div>
                <div id="resultBox" class="hidden"></div>
                <button id="nextBtn" class="btn btn-primary hidden" onclick="nextQuestion()">Câu Tiếp Theo →</button>
            </div>

            <button class="btn btn-secondary" onclick="goHome()">← Về Trang Chủ</button>
        </div>
    </div>

    <script>
        const multipleChoiceQuestions = [
            {
                id: 1,
                category: "Điều kiện xác định",
                question: "Tìm điều kiện xác định của biểu thức √(2x)",
                options: ["x ≥ 0", "x > 0", "x ≤ 0", "x < 0"],
                correct: 0,
                explanation: "Biểu thức √(2x) có nghĩa khi 2x ≥ 0, tức là x ≥ 0"
            },
            {
                id: 2,
                category: "Điều kiện xác định",
                question: "Tìm điều kiện xác định của biểu thức √(-5x)",
                options: ["x ≥ 0", "x ≤ 0", "x > 0", "x < 0"],
                correct: 1,
                explanation: "Biểu thức √(-5x) có nghĩa khi -5x ≥ 0, tức là x ≤ 0"
            },
            {
                id: 3,
                category: "Điều kiện xác định",
                question: "Tìm điều kiện xác định của √(x-1)",
                options: ["x > 1", "x ≥ 1", "x < 1", "x ≤ 1"],
                correct: 1,
                explanation: "Biểu thức √(x-1) có nghĩa khi x-1 ≥ 0, tức là x ≥ 1"
            },
            {
                id: 4,
                category: "Điều kiện xác định",
                question: "Tìm điều kiện xác định của √(2-x)",
                options: ["x ≤ 2", "x < 2", "x ≥ 2", "x > 2"],
                correct: 0,
                explanation: "Biểu thức √(2-x) có nghĩa khi 2-x ≥ 0, tức là x ≤ 2"
            },
            {
                id: 5,
                category: "Trục căn thức",
                question: "Trục căn thức ở mẫu: 5/(2+√3)",
                options: ["10-5√3", "5(2-√3)", "2-√3", "10+5√3"],
                correct: 1,
                explanation: "Nhân cả tử và mẫu với (2-√3): 5(2-√3)/[(2+√3)(2-√3)] = 5(2-√3)/(4-3) = 5(2-√3)"
            },
            {
                id: 6,
                category: "Trục căn thức",
                question: "Trục căn thức ở mẫu: 9/(2√3)",
                options: ["3√3/2", "9√3/6", "3√3", "9/(2√3)"],
                correct: 0,
                explanation: "9/(2√3) = 9√3/(2·3) = 9√3/6 = 3√3/2"
            },
            {
                id: 8,
                category: "Đường tròn",
                question: "Cho đường tròn (O) và góc nội tiếp BAC = 130°. Tính số đo của góc ở tâm BOC:",
                options: ["130°", "260°", "65°", "100°"],
                correct: 1,
                explanation: "Góc ở tâm bằng 2 lần góc nội tiếp cùng chắn một cung. Vậy BOC = 2·130° = 260°"
            },
            {
                id: 10,
                category: "Lượng giác",
                question: "Cho tam giác ABC vuông tại A, đường cao AH. Cho biết AB = 14cm, C = 30°. Tính góc B:",
                options: ["30°", "45°", "60°", "90°"],
                correct: 2,
                explanation: "Trong tam giác vuông ABC, tổng hai góc nhọn = 90°. Vậy B = 90° - C = 90° - 30° = 60°"
            },
            {
                id: 13,
                category: "Rút gọn",
                question: "Rút gọn: √8 + √18 - √32",
                options: ["√2", "2√2", "0", "-√2"],
                correct: 0,
                explanation: "√8 + √18 - √32 = 2√2 + 3√2 - 4√2 = (2+3-4)√2 = √2"
            },
            {
                id: 22,
                category: "Đường tròn",
                question: "Góc nội tiếp chắn nửa đường tròn có số đo là:",
                options: ["45°", "60°", "90°", "180°"],
                correct: 2,
                explanation: "Góc nội tiếp chắn nửa đường tròn là góc vuông (90°)"
            
            },
{
    id: 23,
    category: "Đường tròn",
    question: "Góc ở tâm bằng bao nhiêu lần góc nội tiếp cùng chắn một cung?",
    options: ["1 lần", "2 lần", "3 lần", "4 lần"],
    correct: 1,
    explanation: "Góc ở tâm = 2 lần góc nội tiếp"
},
{
    id: 24,
    category: "Lượng giác",
    question: "Trong tam giác vuông, tổng hai góc nhọn bằng:",
    options: ["45°", "60°", "90°", "180°"],
    correct: 2,
    explanation: "Tam giác vuông có tổng hai góc nhọn bằng 90°"
},
{
    id: 25,
    category: "Lượng giác",
    question: "Cho tam giác vuông có một góc 30°. Góc còn lại bằng:",
    options: ["30°", "45°", "60°", "90°"],
    correct: 2,
    explanation: "90° - 30° = 60°"
},
{
    id: 26,
    category: "Điều kiện xác định",
    question: "Tìm điều kiện xác định của √(3x-6)",
    options: ["x ≥ 2", "x > 2", "x ≤ 2", "x < 2"],
    correct: 0,
    explanation: "3x-6 ≥ 0 ⇒ x ≥ 2"
},
{
    id: 27,
    category: "Điều kiện xác định",
    question: "Tìm điều kiện xác định của √(7- x)",
    options: ["x ≥ 7", "x > 7", "x ≤ 7", "x < 7"],
    correct: 2,
    explanation: "7-x ≥ 0 ⇒ x ≤ 7"
},
{
    id: 28,
    category: "Rút gọn",
    question: "Rút gọn: √72 - √8",

},
{
    id: 95,
    category: "Lượng giác",

}
        ];

        const essayQuestions = [
            {
                id: 101,
                type: "essay",
                category: "Điều kiện xác định",
                question: "Tìm điều kiện xác định của biểu thức √(x+5). Viết câu trả lời dưới dạng bất phương trình.",
                correctAnswers: ["x >= -5", "x ≥ -5", "x>=-5"],
                explanation: "Biểu thức √(x+5) có nghĩa khi x+5 ≥ 0, do đó x ≥ -5",
                hints: "Căn bậc hai xác định khi biểu thức trong căn không âm"
            },
            {
                id: 102,
                type: "essay",
                category: "Rút gọn",
                question: "Rút gọn biểu thức: √12 + √27",
                correctAnswers: ["5√3", "5*√3", "5*sqrt(3)", "5sqrt3"],
                explanation: "√12 = 2√3 và √27 = 3√3, do đó √12 + √27 = 2√3 + 3√3 = 5√3",
                hints: "Phân tích 12 = 4×3 và 27 = 9×3"
            },
            {
                id: 103,
                type: "essay",
                category: "Trục căn thức",
                question: "Trục căn thức ở mẫu: 6/√2. Viết kết quả dưới dạng rút gọn.",
                correctAnswers: ["3√2", "3*√2", "3sqrt2", "3*sqrt(2)"],
                explanation: "6/√2 = (6×√2)/(√2×√2) = 6√2/2 = 3√2",
                hints: "Nhân cả tử và mẫu với √2"
            },
            {
                id: 104,
                type: "essay",
                category: "Lượng giác",
                question: "Trong tam giác vuông, nếu một góc nhọn bằng 35°, góc nhọn còn lại bằng bao nhiêu độ?",
                correctAnswers: ["55°", "55", "55 độ", "55°"],
                explanation: "Tổng hai góc nhọn trong tam giác vuông bằng 90°. Do đó góc còn lại = 90° - 35° = 55°",
                hints: "Tổng ba góc trong tam giác bằng 180°"
            },
            {

                category: "Đường tròn",
                question: "Góc nội tiếp chắn cung 80° có số đo bằng bao nhiêu độ?",
                correctAnswers: ["40°", "40", "40 độ"],
                explanation: "Góc nội tiếp bằng một nửa số đo cung bị chắn. Vậy góc nội tiếp = 80°/2 = 40°",
                hints: "Góc nội tiếp = (1/2) × số đo cung"
            },
            {

                type: "essay",
                category: "Điều kiện xác định",
                question: "Tìm điều kiện xác định của √(3-x)",
                correctAnswers: ["x <= 3", "x ≤ 3", "x<=3"],
                explanation: "√(3-x) có nghĩa khi 3-x ≥ 0, tức là x ≤ 3",
                hints: "Biểu thức trong căn phải không âm"
            },
            {
                id: 107,
                type: "essay",

                question: "Rút gọn: √50 - √8",
                correctAnswers: ["3√2", "3*√2", "3sqrt2"],
                explanation: "√50 = 5√2 và √8 = 2√2, nên √50 - √8 = 5√2 - 2√2 = 3√2",

            },
            {
                id: 108,
                type: "essay",
                category: "Trục căn thức",
                question: "Trục căn thức: 10/√5",
                correctAnswers: ["2√5", "2*√5", "2sqrt5"],
                explanation: "10/√5 = 10√5/5 = 2√5",
                hints: "Nhân tử và mẫu với √5"
            },
            {
                id: 109,
                type: "essay",
                category: "Lượng giác",
                question: "Trong tam giác vuông, tổng hai góc nhọn bằng bao nhiêu độ?",
                correctAnswers: ["90°", "90", "90 độ"],
                explanation: "Trong tam giác vuông, góc vuông = 90°, tổng ba góc = 180°, nên tổng hai góc nhọn = 180° - 90° = 90°",
                hints: "Tổng ba góc trong tam giác = 180°"
            },
            {
                id: 110,
                type: "essay",
                category: "Đường tròn",
                question: "Góc ở tâm chắn cung 60° có số đo bằng bao nhiêu?",
                correctAnswers: ["60°", "60", "60 độ"],
                explanation: "Số đo góc ở tâm bằng số đo cung bị chắn, nên góc ở tâm = 60°",
                hints: "Góc ở tâm = số đo cung"
            }
        ];

        let players = [];
        let currentPlayer = null;
        let currentQuestion = null;
        let streak = 0;
        let selectedAnswer = null;
        let showResult = false;
        let gameMode = 'mixed'; // 'mixed', 'multiple', 'essay'

        function selectMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.btn-mode').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === mode) {
                    btn.classList.add('active');
                }
            });
        }

        function loadPlayers() {
            const saved = localStorage.getItem('mathGamePlayers');
            if (saved) {
                players = JSON.parse(saved);
            }
            updateLeaderboard();
        }

        function savePlayers() {
            localStorage.setItem('mathGamePlayers', JSON.stringify(players));
        }

        function updateLeaderboard() {
            const list = document.getElementById('leaderboardList');
            if (players.length === 0) {
                list.innerHTML = '<p style="color: rgba(255,255,255,0.6); text-align: center;">Chưa có người chơi nào</p>';
                return;
            }

            const sorted = [...players].sort((a, b) => b.score - a.score);
            list.innerHTML = sorted.map((player, index) => {
                const rankEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1;
                const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                return `
                    <div class="leaderboard-item ${rankClass}">
                        <div class="rank">${rankEmoji}</div>
                        <div class="player-info">
                            <div class="player-name">${player.name}</div>
                            <div class="player-stats">Đúng: ${player.correct}/${player.total} | Chuỗi tốt nhất: ${player.bestStreak} 🔥</div>
                        </div>
                        <div class="score">${player.score}</div>
                    </div>
                `;
            }).join('');
        }

        function startGame() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) {
                alert('Vui lòng nhập tên!');
                return;
            }

            let player = players.find(p => p.name === name);
            if (!player) {
                player = {
                    name: name,
                    score: 0,
                    correct: 0,
                    total: 0,
                    bestStreak: 0
                };
                players.push(player);
                savePlayers();
            }

            currentPlayer = player;
            streak = 0;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('currentPlayerName').textContent = name;
            updateScore();
            nextQuestion();
        }

        function getRandomQuestion() {
            if (gameMode === 'multiple') {
                return multipleChoiceQuestions[Math.floor(Math.random() * multipleChoiceQuestions.length)];
            } else if (gameMode === 'essay') {
                return essayQuestions[Math.floor(Math.random() * essayQuestions.length)];
            } else {
                const allQuestions = [...multipleChoiceQuestions, ...essayQuestions];
                return allQuestions[Math.floor(Math.random() * allQuestions.length)];
            }
        }

        function nextQuestion() {
            currentQuestion = getRandomQuestion();
            selectedAnswer = null;
            showResult = false;

            document.getElementById('questionCategory').textContent = currentQuestion.category;
            document.getElementById('questionText').textContent = currentQuestion.question;
            
            if (currentQuestion.type === 'essay') {
                document.getElementById('questionType').textContent = '✍️ Tự Luận';
                document.getElementById('multipleChoiceContainer').classList.add('hidden');
                document.getElementById('essayContainer').classList.remove('hidden');
                document.getElementById('essayInput').value = '';
            } else {
                document.getElementById('questionType').textContent = '✅ Trắc Nghiệm';
                document.getElementById('essayContainer').classList.add('hidden');
                document.getElementById('multipleChoiceContainer').classList.remove('hidden');
                
                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = currentQuestion.options.map((option, index) => `
                    <button class="option-btn" onclick="selectAnswer(${index})">
                        <span style="font-weight: bold; margin-right: 10px;">${String.fromCharCode(65 + index)}.</span>
                        ${option}
                    </button>
                `).join('');
            }

            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
        }

        function normalizeAnswer(answer) {
            return answer.toLowerCase()
                .replace(/\s+/g, '')
                .replace(/degrees?/gi, '')
                .replace(/độ/g, '')
                .replace(/\*/g, '')
                .replace(/sqrt/g, '√')
                .replace(/\(/g, '')
                .replace(/\)/g, '');
        }

        function checkEssayAnswer(userAnswer) {
            const normalized = normalizeAnswer(userAnswer);
            
            for (let correctAns of currentQuestion.correctAnswers) {
                if (normalizeAnswer(correctAns) === normalized) {
                    return { correct: true, partial: false };
                }
            }
            
            // Kiểm tra câu trả lời gần đúng
            for (let correctAns of currentQuestion.correctAnswers) {
                const normCorrect = normalizeAnswer(correctAns);
                if (normalized.includes(normCorrect) || normCorrect.includes(normalized)) {
                    return { correct: false, partial: true };
                }
            }
            
            return { correct: false, partial: false };
        }
        function insertSymbol(symbol) {
    const textarea = document.getElementById('essayInput');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const text = textarea.value;
    
    // Chèn ký tự vào vị trí con trỏ
    const newText = text.substring(0, start) + symbol + text.substring(end);
    textarea.value = newText;
    
    // Đặt con trỏ sau ký tự vừa chèn
    const newCursorPos = start + symbol.length;
    textarea.setSelectionRange(newCursorPos, newCursorPos);
    
    // Focus vào textarea
    textarea.focus();
}

        function submitEssay() {
            if (showResult) return;
            
            const userAnswer = document.getElementById('essayInput').value.trim();
            if (!userAnswer) {
                alert('Vui lòng nhập câu trả lời!');
                return;
            }

            showResult = true;
            const result = checkEssayAnswer(userAnswer);
            
            if (result.correct) {
                streak++;
                const points = 15 + Math.min(streak * 5, 50);
                currentPlayer.score += points;
                currentPlayer.correct++;
            } else if (result.partial) {
                streak = Math.max(0, streak - 1);
                currentPlayer.score += 5;
            } else {
                streak = 0;
            }

            currentPlayer.total++;
            currentPlayer.bestStreak = Math.max(currentPlayer.bestStreak, streak);
            savePlayers();
            updateScore();

            const resultBox = document.getElementById('resultBox');
            let resultClass = result.correct ? 'correct' : result.partial ? 'partial' : 'incorrect';
            let resultTitle = result.correct ? '✅ Chính xác!' : result.partial ? '⚠️ Gần đúng!' : '❌ Sai rồi!';
            
            resultBox.className = 'result-box ' + resultClass;
            resultBox.innerHTML = `
                <div class="result-title">${resultTitle}</div>
                <div class="your-answer"><strong>Câu trả lời của bạn:</strong> ${userAnswer}</div>
                <div class="result-explanation">${currentQuestion.explanation}</div>
                ${result.correct && streak > 0 ? `<div class="bonus-points">🔥 Chuỗi ${streak} câu đúng! +${15 + Math.min(streak * 5, 50)} điểm</div>` : ''}
                ${result.partial ? `<div class="bonus-points">+5 điểm cho câu trả lời gần đúng</div>` : ''}
            `;
            resultBox.classList.remove('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function selectAnswer(index) {
            if (showResult) return;

            selectedAnswer = index;
            showResult = true;
            const isCorrect = index === currentQuestion.correct;

            if (isCorrect) {
                streak++;
            } else {
                streak = 0;
            }

            if (isCorrect) {
                const points = 10 + Math.min(streak * 5, 50);
                currentPlayer.score += points;
                currentPlayer.correct++;
            }
            currentPlayer.total++;
            currentPlayer.bestStreak = Math.max(currentPlayer.bestStreak, streak);
            savePlayers();
            updateScore();

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.add('disabled');
                if (i === currentQuestion.correct) {
                    btn.classList.add('correct');
                } else if (i === selectedAnswer) {
                    btn.classList.add('incorrect');
                }
            });

            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result-box ' + (isCorrect ? 'correct' : 'incorrect');
            resultBox.innerHTML = `
                <div class="result-title">${isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!'}</div>
                <div class="result-explanation">${currentQuestion.explanation}</div>
                ${isCorrect && streak > 0 ? `<div class="bonus-points">🔥 Chuỗi ${streak} câu đúng! +${10 + Math.min(streak * 5, 50)} điểm</div>` : ''}
            `;
            resultBox.classList.remove('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = currentPlayer.score + ' điểm';
            const streakBadge = document.getElementById('streakBadge');
            if (streak > 0) {
                streakBadge.classList.remove('hidden');
                document.getElementById('streakCount').textContent = 'x' + streak;
            } else {
                streakBadge.classList.add('hidden');
            }
        }

        function goHome() {
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            updateLeaderboard();
        }

        loadPlayers();

        document.getElementById('playerNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });

        document.getElementById('essayInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitEssay();
            }
        });
        </script>
